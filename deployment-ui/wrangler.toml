# Cloudflare's current dashboard flow deploys everything through Wrangler
# (npx wrangler deploy), even a plain static build like this one — this
# tells it to serve the Vite build as static assets rather than expecting
# a Worker script. `not_found_handling = "single-page-application"` makes
# every path fall back to index.html, matching how the app already routes
# client-side via a `?tab=` query param rather than distinct URL paths.
name = "deployment-portal-ui"
compatibility_date = "2026-01-01"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
