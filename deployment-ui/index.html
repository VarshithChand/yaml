<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>deployment-ui</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Inlined so this paints immediately on a hard refresh, before the
         app's own stylesheet (injected by the JS bundle) has loaded — this
         is what's on screen instead of a blank tab while React boots. Once
         React mounts, its first render replaces everything inside #root,
         so this markup/CSS is simply discarded — no cleanup needed. */
      html, body { margin: 0; padding: 0; }

      #root { min-height: 100vh; background: #f4f6fb; }
      html[data-theme="dark"] #root { background: #0f172a; }

      .boot-loader {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .boot-loader-mark { position: relative; width: 48px; height: 48px; animation: boot-pulse 1.4s ease-in-out infinite; }

      .boot-loader-ring {
        position: absolute;
        inset: -8px;
        border-radius: 14px;
        border: 2.5px solid transparent;
        border-top-color: #2563eb;
        border-right-color: #2563eb;
        animation: boot-spin .9s linear infinite;
      }
      html[data-theme="dark"] .boot-loader-ring { border-top-color: #60a5fa; border-right-color: #60a5fa; }

      .boot-loader p { margin: 0; font-size: 14px; color: #64748b; }
      html[data-theme="dark"] .boot-loader p { color: #94a3b8; }

      @keyframes boot-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(.92); opacity: .75; }
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-loader-mark, .boot-loader-ring { animation: none; }
      }
    </style>
    <script>
      // Read the persisted theme synchronously, before first paint, so the
      // boot loader doesn't flash the wrong background for a split second
      // (ThemeProvider does the same read again once React mounts).
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="boot-loader">
        <div class="boot-loader-mark">
          <svg width="48" height="48" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
            <rect width="48" height="48" rx="10" fill="#2563eb" />
            <path d="M24 8 L36 22 L28 22 L28 40 L20 40 L20 22 L12 22 Z" fill="#ffffff" />
          </svg>
          <div class="boot-loader-ring"></div>
        </div>
        <p>Loading Deployment Portal&hellip;</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
