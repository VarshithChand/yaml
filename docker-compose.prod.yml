services:
  deployment-api:
    image: ghcr.io/varshithchand/deployment-portal-api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Named volume below, not a bind mount — this file is meant to run
      # standalone (no repo checkout needed), so there's no local
      # ./src/DeploymentAPI/data folder to point at.
      SETTINGS_FILE_PATH: /data/appsettings.Local.json
      GitHub__Owner: ${GITHUB_OWNER}
      GitHub__Repository: ${GITHUB_REPOSITORY}
      GitHub__PersonalAccessToken: ${GITHUB_PAT}
    volumes:
      - deployment-data:/data
      # Same tradeoff as docker-compose.yml's own build-from-source version
      # — gives the Docker management page control over every container on
      # this host, admin-gated in the app itself. See that file's comment
      # for the full explanation before mounting this on a host you don't
      # fully trust.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - portal-network
    expose:
      - "8080"
    restart: unless-stopped

  deployment-ui:
    image: ghcr.io/varshithchand/deployment-portal-ui:latest
    ports:
      - "8081:80"
    depends_on:
      # The image's own HEALTHCHECK (baked in at build time, see
      # src/DeploymentAPI/Dockerfile) still applies here even though this
      # file only pulls the image rather than building it.
      deployment-api:
        condition: service_healthy
    networks:
      - portal-network
    restart: unless-stopped

  # The three sample services — same reasoning as docker-compose.yml: not
  # required for the Portal itself, but without them the Docker page and
  # Services page have nothing real to show.
  admin-api:
    image: ghcr.io/varshithchand/deployment-portal-admin-api:latest
    networks:
      - portal-network
    ports:
      - "8090:8080"
    restart: unless-stopped

  pmscore-api:
    image: ghcr.io/varshithchand/deployment-portal-pmscore-api:latest
    networks:
      - portal-network
    ports:
      - "8091:8080"
    restart: unless-stopped

  security-api:
    image: ghcr.io/varshithchand/deployment-portal-security-api:latest
    networks:
      - portal-network
    ports:
      - "8092:8080"
    restart: unless-stopped

networks:
  portal-network:
    driver: bridge

volumes:
  deployment-data:
