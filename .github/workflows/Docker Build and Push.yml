name: Docker Build and Push

###############################################################
# Builds the Deployment Portal's own two Docker images (the
# backend API and the frontend UI -- see docker-compose.yml at
# the repo root) and pushes them to GitHub Container Registry.
#
# Uses GITHUB_TOKEN, not a separate secret -- GHCR accepts it
# directly, so there's nothing extra to configure on a fresh
# clone of this repo.
###############################################################

on:
  workflow_dispatch:

  push:
    branches:
      - master
    paths:
      - 'deployment-ui/**'
      - 'src/DeploymentAPI/**'
      - 'docker-compose.yml'
      - '.github/workflows/Docker Build and Push.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-build-push-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:

###############################################################
# Build + push both images. One job, matrixed over the two --
# they build independently and don't depend on each other.
###############################################################

  build_and_push:

    name: Build and Push - ${{ matrix.name }}

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: API
            context: ./src/DeploymentAPI
            dockerfile: ./src/DeploymentAPI/Dockerfile
            image: deployment-portal-api

          - name: UI
            context: ./deployment-ui
            dockerfile: ./deployment-ui/Dockerfile
            image: deployment-portal-ui

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

###############################################################
# GHCR requires a lowercase image path -- a GitHub username or
# org name isn't guaranteed to be, so this can't just use
# github.repository_owner directly.
###############################################################

      - name: Lowercase Image Owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and Push - ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

###############################################################
# Summary
###############################################################

  push_complete:

    name: Push Completed

    needs: build_and_push

    if: always()

    runs-on: ubuntu-latest

    steps:

      - name: Push Summary
        run: |

          echo "========================================="
          echo "Docker Build and Push Summary"
          echo "========================================="
          echo "Branch : $GITHUB_REF_NAME"
          echo "Commit : $GITHUB_SHA"
          echo "Result : ${{ needs.build_and_push.result }}"
          echo "========================================="
