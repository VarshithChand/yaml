name: Revert Admin API Artifact

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for running the revert"
        required: false
        default: "Manual Run"

  push:
    branches:
      - S_21_P3
    paths:
      - "artifacts/AdminAPI/**"

jobs:
  revert-admin-artifact:
    name: Revert Admin API Artifact
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Trigger Information
        run: |
          echo "Workflow Triggered"
          echo "Event        : ${{ github.event_name }}"
          echo "Branch       : ${{ github.ref_name }}"
          echo "Actor        : ${{ github.actor }}"
          echo "Commit       : ${{ github.sha }}"
          echo "Reason       : ${{ github.event.inputs.reason }}"

      - name: List AdminAPI Artifacts
        run: |
          echo "Listing artifacts/AdminAPI"
          ls -R artifacts/AdminAPI

