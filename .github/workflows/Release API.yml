name: Release API

on:
  workflow_dispatch:
    inputs:

      service:
        description: "Select Service"
        type: choice
        required: true
        default: Admin
        options:
          - Admin
          - PMSCore
          - Security

      artifact:
        description: "Select Artifact Version"
        type: choice
        required: true
        default: New
        options:
          - New
          - Old1
          - Old2

      deploy_rc:
        description: "Deploy to RC"
        type: boolean
        required: true
        default: true

      deploy_cluster01:
        description: "Deploy Cluster01"
        type: boolean
        required: true
        default: true

      deploy_cluster02:
        description: "Deploy Cluster02"
        type: boolean
        required: true
        default: true

      deploy_cluster03:
        description: "Deploy Cluster03"
        type: boolean
        required: true
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.service }}-${{ github.ref }}
  cancel-in-progress: false

jobs:

###############################################################
# Read Configuration + Resolve Selected Artifact
###############################################################

  read_config:

    name: Read Config & Select Artifact

    runs-on: ubuntu-latest

    outputs:
      sprint: ${{ steps.config.outputs.sprint }}
      patch: ${{ steps.config.outputs.patch }}
      dir: ${{ steps.service.outputs.dir }}
      artifact: ${{ steps.artifact.outputs.artifact }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

###############################################################
# Read patch.config
###############################################################

      - id: config
        shell: bash
        run: |

          echo "Branch : $GITHUB_REF_NAME"

          echo "sprint=$(grep '^SPRINT=' config/patch.config | cut -d '=' -f2)" >> $GITHUB_OUTPUT
          echo "patch=$(grep '^PATCH=' config/patch.config | cut -d '=' -f2)" >> $GITHUB_OUTPUT

###############################################################
# Map selected service -> artifact folder
###############################################################

      - id: service
        shell: bash
        run: |

          case "${{ inputs.service }}" in
            Admin)    DIR="AdminAPI" ;;
            PMSCore)  DIR="PMSCoreAPI" ;;
            Security) DIR="SecurityAPI" ;;
            *)
              echo "Unknown service: ${{ inputs.service }}"
              exit 1
              ;;
          esac

          echo "dir=$DIR" >> $GITHUB_OUTPUT

###############################################################
# Pick the selected artifact version (New / Old1 / Old2)
###############################################################

      - id: artifact
        shell: bash
        run: |

          FOLDER="artifacts/${{ steps.service.outputs.dir }}/${{ inputs.artifact }}"

          LATEST=$(ls -t ${FOLDER}/*.zip 2>/dev/null | head -1)

          if [ -z "$LATEST" ]; then
            echo "No artifact found in ${FOLDER}."
            exit 1
          fi

          echo "Artifact : $LATEST"
          echo "artifact=$LATEST" >> $GITHUB_OUTPUT

###############################################################
# Stage the selected artifact for the deploy jobs
###############################################################

      - name: Stage Selected Artifact
        shell: bash
        run: |

          mkdir -p deploy
          cp "${{ steps.artifact.outputs.artifact }}" deploy/

          ls -R deploy

      - name: Display Configuration
        run: |

          echo "========================================="
          echo "Branch   : $GITHUB_REF_NAME"
          echo "Service  : ${{ inputs.service }}"
          echo "Version  : ${{ inputs.artifact }}"
          echo "Sprint   : ${{ steps.config.outputs.sprint }}"
          echo "Patch    : ${{ steps.config.outputs.patch }}"
          echo "Artifact : ${{ steps.artifact.outputs.artifact }}"
          echo "========================================="

###############################################################
# Upload so every deploy job uses the exact same artifact
###############################################################

      - name: Upload Selected Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReleaseArtifact
          path: deploy
          retention-days: 30
          if-no-files-found: error

###############################################################
# Deploy RC
###############################################################

  deploy_rc:

    if: ${{ inputs.deploy_rc }}

    name: Deploy RC

    needs: read_config

    runs-on: ubuntu-latest

    environment:
      name: RC

    steps:

      - uses: actions/checkout@v4

      - name: Download Selected Artifact
        uses: actions/download-artifact@v4
        with:
          name: ReleaseArtifact
          path: deploy

      - name: Verify Package
        run: ls -R deploy

      - name: Deploy RC
        run: |

          mkdir -p environments/RC
          rm -rf environments/RC/*
          cp -R deploy/. environments/RC/

          echo "${{ inputs.service }} (${{ inputs.artifact }}) deployed to RC"

###############################################################
# Deploy Cluster01
###############################################################

  deploy_cluster01:

    if: ${{ inputs.deploy_cluster01 }}

    name: Deploy Cluster01

    needs: read_config

    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:

      - uses: actions/checkout@v4

      - name: Download Selected Artifact
        uses: actions/download-artifact@v4
        with:
          name: ReleaseArtifact
          path: deploy

      - name: Deploy Cluster01
        run: |

          mkdir -p environments/Cluster01
          rm -rf environments/Cluster01/*
          cp -R deploy/. environments/Cluster01/

          echo "${{ inputs.service }} (${{ inputs.artifact }}) deployed to Cluster01"

###############################################################
# Deploy Cluster02
###############################################################

  deploy_cluster02:

    if: ${{ inputs.deploy_cluster02 }}

    name: Deploy Cluster02

    needs: read_config

    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:

      - uses: actions/checkout@v4

      - name: Download Selected Artifact
        uses: actions/download-artifact@v4
        with:
          name: ReleaseArtifact
          path: deploy

      - name: Deploy Cluster02
        run: |

          mkdir -p environments/Cluster02
          rm -rf environments/Cluster02/*
          cp -R deploy/. environments/Cluster02/

          echo "${{ inputs.service }} (${{ inputs.artifact }}) deployed to Cluster02"

###############################################################
# Deploy Cluster03
###############################################################

  deploy_cluster03:

    if: ${{ inputs.deploy_cluster03 }}

    name: Deploy Cluster03

    needs: read_config

    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:

      - uses: actions/checkout@v4

      - name: Download Selected Artifact
        uses: actions/download-artifact@v4
        with:
          name: ReleaseArtifact
          path: deploy

      - name: Deploy Cluster03
        run: |

          mkdir -p environments/Cluster03
          rm -rf environments/Cluster03/*
          cp -R deploy/. environments/Cluster03/

          echo "${{ inputs.service }} (${{ inputs.artifact }}) deployed to Cluster03"

###############################################################
# Release Summary
###############################################################

  release_complete:

    name: Release Completed

    needs:
      - read_config
      - deploy_rc
      - deploy_cluster01
      - deploy_cluster02
      - deploy_cluster03

    if: always()

    runs-on: ubuntu-latest

    steps:

      - name: Release Summary
        run: |

          echo "========================================="
          echo "${{ inputs.service }} API Release Summary"
          echo "========================================="
          echo "Branch   : $GITHUB_REF_NAME"
          echo "Service  : ${{ inputs.service }}"
          echo "Version  : ${{ inputs.artifact }}"
          echo "Sprint   : ${{ needs.read_config.outputs.sprint }}"
          echo "Patch    : ${{ needs.read_config.outputs.patch }}"
          echo "Artifact : ${{ needs.read_config.outputs.artifact }}"
          echo ""
          echo "Deploy RC        : ${{ needs.deploy_rc.result }}"
          echo "Deploy Cluster01 : ${{ needs.deploy_cluster01.result }}"
          echo "Deploy Cluster02 : ${{ needs.deploy_cluster02.result }}"
          echo "Deploy Cluster03 : ${{ needs.deploy_cluster03.result }}"
          echo "========================================="
