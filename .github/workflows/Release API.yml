name: Release API

on:
  workflow_dispatch:
    inputs:

###############################################################
# Admin API
###############################################################

      svc_admin:
        description: "Release Admin API"
        type: boolean
        required: true
        default: true

      admin_version:
        description: "Admin - Artifact Version"
        type: choice
        required: true
        default: New
        options:
          - New
          - Old1
          - Old2

###############################################################
# PMSCore API
###############################################################

      svc_pmscore:
        description: "Release PMSCore API"
        type: boolean
        required: true
        default: false

      pmscore_version:
        description: "PMSCore - Artifact Version"
        type: choice
        required: true
        default: New
        options:
          - New
          - Old1
          - Old2

###############################################################
# Security API
###############################################################

      svc_security:
        description: "Release Security API"
        type: boolean
        required: true
        default: false

      security_version:
        description: "Security - Artifact Version"
        type: choice
        required: true
        default: New
        options:
          - New
          - Old1
          - Old2

###############################################################
# Targets
###############################################################

      deploy_rc:
        description: "Deploy to RC"
        type: boolean
        required: true
        default: true

      deploy_cluster01:
        description: "Deploy Cluster01"
        type: boolean
        required: true
        default: true

      deploy_cluster02:
        description: "Deploy Cluster02"
        type: boolean
        required: true
        default: true

      deploy_cluster03:
        description: "Deploy Cluster03"
        type: boolean
        required: true
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

###############################################################
# Guard -- runs FIRST, before anything else.
#
# If no API checkbox is ticked, stop here with a clear,
# friendly message telling the user what to do, and write it
# to the run summary so it's visible without opening logs.
###############################################################

  guard:

    name: Check Selection

    runs-on: ubuntu-latest

    steps:

      - name: Ensure At Least One API Is Selected
        shell: bash
        run: |

          if [ "${{ inputs.svc_admin }}"    != "true" ] && \
             [ "${{ inputs.svc_pmscore }}"  != "true" ] && \
             [ "${{ inputs.svc_security }}" != "true" ]; then

            {
              echo "## No API selected"
              echo ""
              echo "You started the release without choosing any service."
              echo ""
              echo "Please **Run workflow** again and tick at least one of:"
              echo "- Release Admin API"
              echo "- Release PMSCore API"
              echo "- Release Security API"
            } >> "$GITHUB_STEP_SUMMARY"

            echo "=================================================="
            echo " No API selected."
            echo " Re-run the workflow and tick at least one service:"
            echo "   - Release Admin API"
            echo "   - Release PMSCore API"
            echo "   - Release Security API"
            echo "=================================================="

            exit 1
          fi

          echo "Selection OK."

###############################################################
# Ensure the chosen targets aren't all unticked either
###############################################################

      - name: Ensure At Least One Target Is Selected
        shell: bash
        run: |

          if [ "${{ inputs.deploy_rc }}"        != "true" ] && \
             [ "${{ inputs.deploy_cluster01 }}" != "true" ] && \
             [ "${{ inputs.deploy_cluster02 }}" != "true" ] && \
             [ "${{ inputs.deploy_cluster03 }}" != "true" ]; then

            {
              echo "## No deployment target selected"
              echo ""
              echo "You picked a service but no target to deploy it to."
              echo ""
              echo "Please **Run workflow** again and tick at least one of:"
              echo "- Deploy to RC"
              echo "- Deploy Cluster01 / Cluster02 / Cluster03"
            } >> "$GITHUB_STEP_SUMMARY"

            echo "=================================================="
            echo " No deployment target selected."
            echo " Re-run and tick at least one of RC / Cluster01/02/03."
            echo "=================================================="

            exit 1
          fi

          echo "Targets OK."

###############################################################
# Read Config + Build list of selected services & versions
###############################################################

  read_config:

    name: Read Config & Select Artifacts

    needs: guard

    runs-on: ubuntu-latest

    outputs:
      sprint: ${{ steps.config.outputs.sprint }}
      patch: ${{ steps.config.outputs.patch }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      selected: ${{ steps.matrix.outputs.selected }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

###############################################################
# Read patch.config
###############################################################

      - id: config
        shell: bash
        run: |

          echo "Branch : $GITHUB_REF_NAME"

          echo "sprint=$(grep '^SPRINT=' config/patch.config | cut -d '=' -f2)" >> $GITHUB_OUTPUT
          echo "patch=$(grep '^PATCH=' config/patch.config | cut -d '=' -f2)" >> $GITHUB_OUTPUT

###############################################################
# Build matrix -- each selected service carries its OWN version
###############################################################

      - id: matrix
        shell: bash
        run: |

          ITEMS=""
          SELECTED=""

          add() {
            # $1 = display name, $2 = artifact folder, $3 = chosen version
            [ -n "$ITEMS" ] && ITEMS="${ITEMS},"
            ITEMS="${ITEMS}{\"name\":\"$1\",\"dir\":\"$2\",\"version\":\"$3\"}"
            SELECTED="${SELECTED}$1=$3 "
          }

          if [ "${{ inputs.svc_admin }}" = "true" ]; then
            add "Admin" "AdminAPI" "${{ inputs.admin_version }}"
          fi

          if [ "${{ inputs.svc_pmscore }}" = "true" ]; then
            add "PMSCore" "PMSCoreAPI" "${{ inputs.pmscore_version }}"
          fi

          if [ "${{ inputs.svc_security }}" = "true" ]; then
            add "Security" "SecurityAPI" "${{ inputs.security_version }}"
          fi

          echo "Selected : $SELECTED"

          echo "matrix={\"include\":[${ITEMS}]}" >> $GITHUB_OUTPUT
          echo "selected=${SELECTED}" >> $GITHUB_OUTPUT

###############################################################
# Verify each selected service has its chosen version
###############################################################

      - name: Verify Selected Artifacts Exist
        shell: bash
        run: |

          MISSING=""

          check() {
            # $1 = artifact folder, $2 = chosen version
            FOLDER="artifacts/$1/$2"

            # '|| true' is required: GitHub runs steps with 'bash -e -o pipefail',
            # so a non-matching glob makes ls exit 2 and kills the whole step
            # before the [ -z ] check below can report MISSING.
            FILE=$(ls -t ${FOLDER}/*.zip 2>/dev/null | head -1) || true

            if [ -z "$FILE" ]; then
              echo "MISSING: no artifact in ${FOLDER}"
              MISSING="${MISSING}- ${FOLDER}"$'\n'
            else
              echo "OK: $FILE"
            fi
          }

          if [ "${{ inputs.svc_admin }}" = "true" ]; then
            check "AdminAPI" "${{ inputs.admin_version }}"
          fi

          if [ "${{ inputs.svc_pmscore }}" = "true" ]; then
            check "PMSCoreAPI" "${{ inputs.pmscore_version }}"
          fi

          if [ "${{ inputs.svc_security }}" = "true" ]; then
            check "SecurityAPI" "${{ inputs.security_version }}"
          fi

          if [ -n "$MISSING" ]; then

            {
              echo "## Artifact not found"
              echo ""
              echo "These selected services have no artifact for the chosen version:"
              echo ""
              echo "$MISSING"
              echo "Pick a version that exists (e.g. **New**), or run the build first."
            } >> "$GITHUB_STEP_SUMMARY"

            echo "One or more selected services have no artifact for the chosen version."
            exit 1
          fi

      - name: Display Configuration
        run: |

          echo "========================================="
          echo "Branch   : $GITHUB_REF_NAME"
          echo "Selected : ${{ steps.matrix.outputs.selected }}"
          echo "Sprint   : ${{ steps.config.outputs.sprint }}"
          echo "Patch    : ${{ steps.config.outputs.patch }}"
          echo "========================================="

###############################################################
# Deploy RC  (one leg per selected API, each with its own version)
###############################################################

  deploy_rc:

    if: ${{ inputs.deploy_rc }}

    name: Deploy RC - ${{ matrix.name }} (${{ matrix.version }})

    needs: read_config

    runs-on: ubuntu-latest

    environment:
      name: RC

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.read_config.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4

      - name: Get Selected Artifact
        shell: bash
        run: |

          FOLDER="artifacts/${{ matrix.dir }}/${{ matrix.version }}"

          mkdir -p deploy

          LATEST=$(ls -t ${FOLDER}/*.zip 2>/dev/null | head -1) || true

          if [ -z "$LATEST" ]; then
            echo "No artifact found in ${FOLDER}."
            exit 1
          fi

          echo "Service  : ${{ matrix.name }}"
          echo "Version  : ${{ matrix.version }}"
          echo "Artifact : $LATEST"

          cp "$LATEST" deploy/

      - name: Verify Package
        run: ls -R deploy

      - name: Deploy RC
        run: |

          mkdir -p "environments/RC/${{ matrix.dir }}"
          rm -rf "environments/RC/${{ matrix.dir }}"/*
          cp -R deploy/. "environments/RC/${{ matrix.dir }}/"

          echo "${{ matrix.name }} (${{ matrix.version }}) deployed to RC"

###############################################################
# Deploy Cluster01
###############################################################

  deploy_cluster01:

    if: ${{ inputs.deploy_cluster01 }}

    name: Deploy Cluster01 - ${{ matrix.name }} (${{ matrix.version }})

    needs: read_config

    runs-on: ubuntu-latest

    environment:
      name: Cluster01

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.read_config.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4

      - name: Get Selected Artifact
        shell: bash
        run: |

          FOLDER="artifacts/${{ matrix.dir }}/${{ matrix.version }}"

          mkdir -p deploy

          LATEST=$(ls -t ${FOLDER}/*.zip 2>/dev/null | head -1) || true

          if [ -z "$LATEST" ]; then
            echo "No artifact found in ${FOLDER}."
            exit 1
          fi

          echo "Artifact : $LATEST"
          cp "$LATEST" deploy/

      - name: Deploy Cluster01
        run: |

          mkdir -p "environments/Cluster01/${{ matrix.dir }}"
          rm -rf "environments/Cluster01/${{ matrix.dir }}"/*
          cp -R deploy/. "environments/Cluster01/${{ matrix.dir }}/"

          echo "${{ matrix.name }} (${{ matrix.version }}) deployed to Cluster01"

###############################################################
# Deploy Cluster02
###############################################################

  deploy_cluster02:

    if: ${{ inputs.deploy_cluster02 }}

    name: Deploy Cluster02 - ${{ matrix.name }} (${{ matrix.version }})

    needs: read_config

    runs-on: ubuntu-latest

    environment:
      name: Cluster02

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.read_config.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4

      - name: Get Selected Artifact
        shell: bash
        run: |

          FOLDER="artifacts/${{ matrix.dir }}/${{ matrix.version }}"

          mkdir -p deploy

          LATEST=$(ls -t ${FOLDER}/*.zip 2>/dev/null | head -1) || true

          if [ -z "$LATEST" ]; then
            echo "No artifact found in ${FOLDER}."
            exit 1
          fi

          echo "Artifact : $LATEST"
          cp "$LATEST" deploy/

      - name: Deploy Cluster02
        run: |

          mkdir -p "environments/Cluster02/${{ matrix.dir }}"
          rm -rf "environments/Cluster02/${{ matrix.dir }}"/*
          cp -R deploy/. "environments/Cluster02/${{ matrix.dir }}/"

          echo "${{ matrix.name }} (${{ matrix.version }}) deployed to Cluster02"

###############################################################
# Deploy Cluster03
###############################################################

  deploy_cluster03:

    if: ${{ inputs.deploy_cluster03 }}

    name: Deploy Cluster03 - ${{ matrix.name }} (${{ matrix.version }})

    needs: read_config

    runs-on: ubuntu-latest

    environment:
      name: Cluster03

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.read_config.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4

      - name: Get Selected Artifact
        shell: bash
        run: |

          FOLDER="artifacts/${{ matrix.dir }}/${{ matrix.version }}"

          mkdir -p deploy

          LATEST=$(ls -t ${FOLDER}/*.zip 2>/dev/null | head -1) || true

          if [ -z "$LATEST" ]; then
            echo "No artifact found in ${FOLDER}."
            exit 1
          fi

          echo "Artifact : $LATEST"
          cp "$LATEST" deploy/

      - name: Deploy Cluster03
        run: |

          mkdir -p "environments/Cluster03/${{ matrix.dir }}"
          rm -rf "environments/Cluster03/${{ matrix.dir }}"/*
          cp -R deploy/. "environments/Cluster03/${{ matrix.dir }}/"

          echo "${{ matrix.name }} (${{ matrix.version }}) deployed to Cluster03"

###############################################################
# Release Summary
###############################################################

  release_complete:

    name: Release Completed

    needs:
      - read_config
      - deploy_rc
      - deploy_cluster01
      - deploy_cluster02
      - deploy_cluster03

    if: always()

    runs-on: ubuntu-latest

    steps:

      - name: Release Summary
        run: |

          echo "========================================="
          echo "API Release Summary"
          echo "========================================="
          echo "Branch   : $GITHUB_REF_NAME"
          echo "Sprint   : ${{ needs.read_config.outputs.sprint }}"
          echo "Patch    : ${{ needs.read_config.outputs.patch }}"
          echo ""
          echo "Released : ${{ needs.read_config.outputs.selected }}"
          echo ""
          echo "Deploy RC        : ${{ needs.deploy_rc.result }}"
          echo "Deploy Cluster01 : ${{ needs.deploy_cluster01.result }}"
          echo "Deploy Cluster02 : ${{ needs.deploy_cluster02.result }}"
          echo "Deploy Cluster03 : ${{ needs.deploy_cluster03.result }}"
          echo "========================================="
