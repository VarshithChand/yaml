name: Release API

on:
  workflow_dispatch:
    inputs:

###############################################################
# Select one, two, or all three APIs
###############################################################

      svc_admin:
        description: "Release Admin API"
        type: boolean
        required: true
        default: true

      svc_pmscore:
        description: "Release PMSCore API"
        type: boolean
        required: true
        default: false

      svc_security:
        description: "Release Security API"
        type: boolean
        required: true
        default: false

###############################################################
# Artifact version (applies to every selected API)
###############################################################

      artifact:
        description: "Select Artifact Version"
        type: choice
        required: true
        default: New
        options:
          - New
          - Old1
          - Old2

###############################################################
# Targets
###############################################################

      deploy_rc:
        description: "Deploy to RC"
        type: boolean
        required: true
        default: true

      deploy_cluster01:
        description: "Deploy Cluster01"
        type: boolean
        required: true
        default: true

      deploy_cluster02:
        description: "Deploy Cluster02"
        type: boolean
        required: true
        default: true

      deploy_cluster03:
        description: "Deploy Cluster03"
        type: boolean
        required: true
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

###############################################################
# Read Config + Build the list of selected services
###############################################################

  read_config:

    name: Read Config & Select Artifacts

    runs-on: ubuntu-latest

    outputs:
      sprint: ${{ steps.config.outputs.sprint }}
      patch: ${{ steps.config.outputs.patch }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      selected: ${{ steps.matrix.outputs.selected }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

###############################################################
# Read patch.config
###############################################################

      - id: config
        shell: bash
        run: |

          echo "Branch : $GITHUB_REF_NAME"

          echo "sprint=$(grep '^SPRINT=' config/patch.config | cut -d '=' -f2)" >> $GITHUB_OUTPUT
          echo "patch=$(grep '^PATCH=' config/patch.config | cut -d '=' -f2)" >> $GITHUB_OUTPUT

###############################################################
# Build matrix from the ticked checkboxes
###############################################################

      - id: matrix
        shell: bash
        run: |

          ITEMS=""
          SELECTED=""

          add() {
            [ -n "$ITEMS" ] && ITEMS="${ITEMS},"
            ITEMS="${ITEMS}{\"name\":\"$1\",\"dir\":\"$2\"}"
            SELECTED="${SELECTED}$1 "
          }

          if [ "${{ inputs.svc_admin }}"    = "true" ]; then add "Admin"    "AdminAPI";    fi
          if [ "${{ inputs.svc_pmscore }}"  = "true" ]; then add "PMSCore"  "PMSCoreAPI";  fi
          if [ "${{ inputs.svc_security }}" = "true" ]; then add "Security" "SecurityAPI"; fi

          if [ -z "$ITEMS" ]; then
            echo "No API selected. Tick at least one service."
            exit 1
          fi

          echo "Selected : $SELECTED"

          echo "matrix={\"include\":[${ITEMS}]}" >> $GITHUB_OUTPUT
          echo "selected=${SELECTED}" >> $GITHUB_OUTPUT

###############################################################
# Verify every selected service actually has the chosen version
###############################################################

      - name: Verify Selected Artifacts Exist
        shell: bash
        run: |

          set -e
          MISSING=0

          check() {
            FOLDER="artifacts/$1/${{ inputs.artifact }}"
            FILE=$(ls -t ${FOLDER}/*.zip 2>/dev/null | head -1)

            if [ -z "$FILE" ]; then
              echo "MISSING: no artifact in ${FOLDER}"
              MISSING=1
            else
              echo "OK: $FILE"
            fi
          }

          if [ "${{ inputs.svc_admin }}"    = "true" ]; then check "AdminAPI";    fi
          if [ "${{ inputs.svc_pmscore }}"  = "true" ]; then check "PMSCoreAPI";  fi
          if [ "${{ inputs.svc_security }}" = "true" ]; then check "SecurityAPI"; fi

          if [ "$MISSING" = "1" ]; then
            echo "One or more selected services have no ${{ inputs.artifact }} artifact."
            exit 1
          fi

      - name: Display Configuration
        run: |

          echo "========================================="
          echo "Branch   : $GITHUB_REF_NAME"
          echo "Services : ${{ steps.matrix.outputs.selected }}"
          echo "Version  : ${{ inputs.artifact }}"
          echo "Sprint   : ${{ steps.config.outputs.sprint }}"
          echo "Patch    : ${{ steps.config.outputs.patch }}"
          echo "========================================="

###############################################################
# Deploy RC  (one leg per selected API)
###############################################################

  deploy_rc:

    if: ${{ inputs.deploy_rc }}

    name: Deploy RC - ${{ matrix.name }}

    needs: read_config

    runs-on: ubuntu-latest

    environment:
      name: RC

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.read_config.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4

      - name: Get Selected Artifact
        shell: bash
        run: |

          FOLDER="artifacts/${{ matrix.dir }}/${{ inputs.artifact }}"

          mkdir -p deploy
          LATEST=$(ls -t ${FOLDER}/*.zip | head -1)

          echo "Artifact : $LATEST"
          cp "$LATEST" deploy/

      - name: Verify Package
        run: ls -R deploy

      - name: Deploy RC
        run: |

          mkdir -p "environments/RC/${{ matrix.dir }}"
          rm -rf "environments/RC/${{ matrix.dir }}"/*
          cp -R deploy/. "environments/RC/${{ matrix.dir }}/"

          echo "${{ matrix.name }} (${{ inputs.artifact }}) deployed to RC"

###############################################################
# Deploy Cluster01
###############################################################

  deploy_cluster01:

    if: ${{ inputs.deploy_cluster01 }}

    name: Deploy Cluster01 - ${{ matrix.name }}

    needs: read_config

    runs-on: ubuntu-latest

    environment:
      name: Production

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.read_config.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4

      - name: Get Selected Artifact
        shell: bash
        run: |

          FOLDER="artifacts/${{ matrix.dir }}/${{ inputs.artifact }}"

          mkdir -p deploy
          LATEST=$(ls -t ${FOLDER}/*.zip | head -1)

          echo "Artifact : $LATEST"
          cp "$LATEST" deploy/

      - name: Deploy Cluster01
        run: |

          mkdir -p "environments/Cluster01/${{ matrix.dir }}"
          rm -rf "environments/Cluster01/${{ matrix.dir }}"/*
          cp -R deploy/. "environments/Cluster01/${{ matrix.dir }}/"

          echo "${{ matrix.name }} (${{ inputs.artifact }}) deployed to Cluster01"

###############################################################
# Deploy Cluster02
###############################################################

  deploy_cluster02:

    if: ${{ inputs.deploy_cluster02 }}

    name: Deploy Cluster02 - ${{ matrix.name }}

    needs: read_config

    runs-on: ubuntu-latest

    environment:
      name: Production

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.read_config.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4

      - name: Get Selected Artifact
        shell: bash
        run: |

          FOLDER="artifacts/${{ matrix.dir }}/${{ inputs.artifact }}"

          mkdir -p deploy
          LATEST=$(ls -t ${FOLDER}/*.zip | head -1)

          echo "Artifact : $LATEST"
          cp "$LATEST" deploy/

      - name: Deploy Cluster02
        run: |

          mkdir -p "environments/Cluster02/${{ matrix.dir }}"
          rm -rf "environments/Cluster02/${{ matrix.dir }}"/*
          cp -R deploy/. "environments/Cluster02/${{ matrix.dir }}/"

          echo "${{ matrix.name }} (${{ inputs.artifact }}) deployed to Cluster02"

###############################################################
# Deploy Cluster03
###############################################################

  deploy_cluster03:

    if: ${{ inputs.deploy_cluster03 }}

    name: Deploy Cluster03 - ${{ matrix.name }}

    needs: read_config

    runs-on: ubuntu-latest

    environment:
      name: Production

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.read_config.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4

      - name: Get Selected Artifact
        shell: bash
        run: |

          FOLDER="artifacts/${{ matrix.dir }}/${{ inputs.artifact }}"

          mkdir -p deploy
          LATEST=$(ls -t ${FOLDER}/*.zip | head -1)

          echo "Artifact : $LATEST"
          cp "$LATEST" deploy/

      - name: Deploy Cluster03
        run: |

          mkdir -p "environments/Cluster03/${{ matrix.dir }}"
          rm -rf "environments/Cluster03/${{ matrix.dir }}"/*
          cp -R deploy/. "environments/Cluster03/${{ matrix.dir }}/"

          echo "${{ matrix.name }} (${{ inputs.artifact }}) deployed to Cluster03"

###############################################################
# Release Summary
###############################################################

  release_complete:

    name: Release Completed

    needs:
      - read_config
      - deploy_rc
      - deploy_cluster01
      - deploy_cluster02
      - deploy_cluster03

    if: always()

    runs-on: ubuntu-latest

    steps:

      - name: Release Summary
        run: |

          echo "========================================="
          echo "API Release Summary"
          echo "========================================="
          echo "Branch   : $GITHUB_REF_NAME"
          echo "Services : ${{ needs.read_config.outputs.selected }}"
          echo "Version  : ${{ inputs.artifact }}"
          echo "Sprint   : ${{ needs.read_config.outputs.sprint }}"
          echo "Patch    : ${{ needs.read_config.outputs.patch }}"
          echo ""
          echo "Deploy RC        : ${{ needs.deploy_rc.result }}"
          echo "Deploy Cluster01 : ${{ needs.deploy_cluster01.result }}"
          echo "Deploy Cluster02 : ${{ needs.deploy_cluster02.result }}"
          echo "Deploy Cluster03 : ${{ needs.deploy_cluster03.result }}"
          echo "========================================="
