name: Admin API CI

on:
  workflow_dispatch:

  push:
    branches:
      - master
      - patch-cicd-demo

    paths:
      - 'src/AdminAPI/**'
      - 'config/patch.config'

    paths-ignore:
      - 'artifacts/**'

permissions:
  contents: write

env:
  CONFIG_FILE: config/patch.config

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Read Patch Configuration
        shell: bash
        run: |
          echo "SPRINT=$(grep '^SPRINT=' $CONFIG_FILE | cut -d '=' -f2)" >> $GITHUB_ENV
          echo "PATCH=$(grep '^PATCH=' $CONFIG_FILE | cut -d '=' -f2)" >> $GITHUB_ENV
          echo "VERSION=$(grep '^VERSION=' $CONFIG_FILE | cut -d '=' -f2)" >> $GITHUB_ENV

      - name: Display Configuration
        run: |
          echo "Sprint  : $SPRINT"
          echo "Patch   : $PATCH"
          echo "Version : $VERSION"

      - name: Restore
        run: dotnet restore src/AdminAPI/AdminAPI.csproj

      - name: Build
        run: dotnet build src/AdminAPI/AdminAPI.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test src/AdminAPI/AdminAPI.csproj --no-build --verbosity normal

      - name: Publish
        run: |
          dotnet publish src/AdminAPI/AdminAPI.csproj \
            -c Release \
            -o publish/AdminAPI

      - name: Verify Publish Output
        run: |
          ls -R publish/AdminAPI

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Create Artifact Structure
        shell: bash
        run: |
          mkdir -p artifacts/AdminAPI/New
          mkdir -p artifacts/AdminAPI/Old1
          mkdir -p artifacts/AdminAPI/Old2

      - name: Rotate Previous Artifacts
        shell: bash
        run: |

          echo "Moving Old1 -> Old2"

          rm -rf artifacts/AdminAPI/Old2/* || true

          if [ -d "artifacts/AdminAPI/Old1" ] && [ "$(ls -A artifacts/AdminAPI/Old1)" ]; then
            mv artifacts/AdminAPI/Old1/* artifacts/AdminAPI/Old2/
          fi

          echo "Moving New -> Old1"

          if [ -d "artifacts/AdminAPI/New" ] && [ "$(ls -A artifacts/AdminAPI/New)" ]; then
            mv artifacts/AdminAPI/New/* artifacts/AdminAPI/Old1/
          fi

      - name: Create Latest Artifact
        shell: bash
        run: |
          zip -r \
          artifacts/AdminAPI/New/Admin_Sprint${SPRINT}_Patch${PATCH}.zip \
          publish/AdminAPI

      - name: Verify Repository Artifacts
        run: |
          echo "Repository Artifact Structure"
          ls -R artifacts

      - name: Commit Repository Artifacts
        shell: bash
        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add artifacts

          git diff --cached --quiet || git commit -m "AdminAPI Artifact Sprint ${SPRINT} Patch ${PATCH}"

          git push origin ${GITHUB_REF_NAME}

      - name: Upload GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Admin_Sprint${{ env.SPRINT }}_Patch${{ env.PATCH }}
          path: artifacts/AdminAPI/New/Admin_Sprint${{ env.SPRINT }}_Patch${{ env.PATCH }}.zip
          if-no-files-found: error
          retention-days: 30
