name: Admin API CI

on:
  workflow_dispatch:

  push:
    branches:
      - master
      - patch-cicd-demo

    paths:
      - 'src/AdminAPI/**'
      - 'config/patch.config'

env:
  CONFIG_FILE: config/patch.config

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Read Patch Configuration
        shell: bash
        run: |
          echo "SPRINT=$(grep '^SPRINT=' $CONFIG_FILE | cut -d '=' -f2)" >> $GITHUB_ENV
          echo "PATCH=$(grep '^PATCH=' $CONFIG_FILE | cut -d '=' -f2)" >> $GITHUB_ENV
          echo "VERSION=$(grep '^VERSION=' $CONFIG_FILE | cut -d '=' -f2)" >> $GITHUB_ENV

      - name: Display Configuration
        run: |
          echo "Sprint : $SPRINT"
          echo "Patch  : $PATCH"
          echo "Version: $VERSION"

      - name: Restore
        run: dotnet restore src/AdminAPI/AdminAPI.csproj

      - name: Build
        run: dotnet build src/AdminAPI/AdminAPI.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test src/AdminAPI/AdminAPI.csproj --no-build --verbosity normal

      - name: Publish
        run: |
          dotnet publish src/AdminAPI/AdminAPI.csproj \
            -c Release \
            -o publish/AdminAPI

      - name: Verify Publish Output
        run: |
          echo "Published Files"
          ls -R publish/AdminAPI

      - name: Create Artifact Folder
        run: |
          mkdir -p artifacts/Sprint${SPRINT}/Patch${PATCH}
          cp -R publish/AdminAPI/. artifacts/Sprint${SPRINT}/Patch${PATCH}/

      - name: Verify Artifact Folder
        run: |
          echo "Artifact Structure"
          ls -R artifacts

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Admin_Sprint${{ env.SPRINT }}_Patch${{ env.PATCH }}
          path: artifacts/Sprint${{ env.SPRINT }}/Patch${{ env.PATCH }}
          if-no-files-found: error
          retention-days: 30
