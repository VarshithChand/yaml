name: Release Admin API

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  read_config:
    name: Read Patch Configuration
    runs-on: ubuntu-latest

    outputs:
      sprint: ${{ steps.config.outputs.sprint }}
      patch: ${{ steps.config.outputs.patch }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - id: config
        shell: bash
        run: |
          echo "sprint=$(grep '^SPRINT=' config/patch.config | cut -d '=' -f2)" >> $GITHUB_OUTPUT
          echo "patch=$(grep '^PATCH=' config/patch.config | cut -d '=' -f2)" >> $GITHUB_OUTPUT

      - name: Display Patch Information
        run: |
          echo "Sprint : ${{ steps.config.outputs.sprint }}"
          echo "Patch  : ${{ steps.config.outputs.patch }}"

###############################################################
# RC Deployment (Approval Required)
###############################################################

  deploy_rc:
    name: Deploy to RC
    needs: read_config
    runs-on: ubuntu-latest

    environment:
      name: RC

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Latest Admin Artifact
        shell: bash
        run: |
          mkdir -p deploy

          LATEST=$(ls -t artifacts/AdminAPI/New/*.zip | head -1)

          echo "Latest Artifact:"
          echo "$LATEST"

          cp "$LATEST" deploy/

      - name: Verify Deployment Package
        run: |
          ls -R deploy

      - name: Deploy to RC
        run: |
          mkdir -p environments/RC
          cp -R deploy/. environments/RC/

###############################################################
# Cluster01 (Approval Required)
###############################################################

  deploy_cluster01:
    name: Deploy Cluster01
    needs: deploy_rc
    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:

      - uses: actions/checkout@v4

      - name: Get Latest Admin Artifact
        shell: bash
        run: |
          mkdir -p deploy

          LATEST=$(ls -t artifacts/AdminAPI/New/*.zip | head -1)

          cp "$LATEST" deploy/

      - name: Deploy Cluster01
        run: |
          mkdir -p environments/Cluster01
          cp -R deploy/. environments/Cluster01/

###############################################################
# Cluster02
###############################################################

  deploy_cluster02:
    name: Deploy Cluster02
    needs: deploy_cluster01
    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:

      - uses: actions/checkout@v4

      - name: Get Latest Admin Artifact
        shell: bash
        run: |
          mkdir -p deploy

          LATEST=$(ls -t artifacts/AdminAPI/New/*.zip | head -1)

          cp "$LATEST" deploy/

      - name: Deploy Cluster02
        run: |
          mkdir -p environments/Cluster02
          cp -R deploy/. environments/Cluster02/

###############################################################
# Cluster03
###############################################################

  deploy_cluster03:
    name: Deploy Cluster03
    needs: deploy_cluster02
    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:

      - uses: actions/checkout@v4

      - name: Get Latest Admin Artifact
        shell: bash
        run: |
          mkdir -p deploy

          LATEST=$(ls -t artifacts/AdminAPI/New/*.zip | head -1)

          cp "$LATEST" deploy/

      - name: Deploy Cluster03
        run: |
          mkdir -p environments/Cluster03
          cp -R deploy/. environments/Cluster03/
