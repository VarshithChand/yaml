name: Release Admin API (REST)

on:
  workflow_dispatch:
    inputs:

      artifact_id:
        description: "GitHub Artifact ID"
        required: true
        type: string

      deploy_rc:
        description: "Deploy to RC"
        required: true
        default: true
        type: boolean

      deploy_cluster01:
        description: "Deploy Cluster01"
        required: true
        default: true
        type: boolean

      deploy_cluster02:
        description: "Deploy Cluster02"
        required: true
        default: true
        type: boolean

      deploy_cluster03:
        description: "Deploy Cluster03"
        required: true
        default: true
        type: boolean

permissions:
  actions: read
  contents: read

concurrency:
  group: admin-release-${{ github.ref }}
  cancel-in-progress: false

jobs:

###############################################################
# Download Selected Artifact
###############################################################

  download_artifact:

    name: Download Selected Artifact

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display Inputs
        run: |
          echo "Repository : ${{ github.repository }}"
          echo "Branch     : ${{ github.ref_name }}"
          echo "Artifact ID: ${{ inputs.artifact_id }}"

      - name: Download Artifact Using REST API

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |

          curl -L \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${{ inputs.artifact_id }}/zip \
          -o AdminAPI.zip

      - name: Verify Download

        run: |

          ls -lh

      - name: Extract Artifact

        run: |

          mkdir -p deploy

          unzip AdminAPI.zip -d deploy

      - name: Verify Extracted Files

        run: |

          ls -R deploy

      - name: Upload Deploy Files

        uses: actions/upload-artifact@v4

        with:

          name: deploy-files

          path: deploy

###############################################################
# RC Deployment
###############################################################

  deploy_rc:

    if: ${{ inputs.deploy_rc }}

    name: Deploy RC

    needs: download_artifact

    runs-on: ubuntu-latest

    environment:
      name: RC

    steps:

      - name: Download Deploy Files

        uses: actions/download-artifact@v4

        with:

          name: deploy-files

          path: deploy

      - name: Verify Files

        run: |

          ls -R deploy

      - name: Deploy To RC

        run: |

          mkdir -p environments/RC

          cp -R deploy/. environments/RC/

      - name: Verify RC Deployment

        run: |

          echo "RC Deployment Completed"

          ls -R environments/RC

      - name: Upload RC Package

        uses: actions/upload-artifact@v4

        with:

          name: rc-package

          path: environments/RC
###############################################################
# Production Deployment
###############################################################

  deploy_production:

    name: Deploy Production

    needs:
      - download_artifact
      - deploy_rc

    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:

      - name: Download Deploy Files

        uses: actions/download-artifact@v4

        with:
          name: deploy-files
          path: deploy

      - name: Verify Files

        run: |
          ls -R deploy

###############################################################
# Cluster01
###############################################################

      - name: Deploy Cluster01

        if: ${{ inputs.deploy_cluster01 }}

        run: |

          echo "================================="
          echo "Deploying to Cluster01"
          echo "================================="

          mkdir -p environments/Cluster01

          cp -R deploy/. environments/Cluster01/

###############################################################
# Cluster02
###############################################################

      - name: Deploy Cluster02

        if: ${{ inputs.deploy_cluster02 }}

        run: |

          echo "================================="
          echo "Deploying to Cluster02"
          echo "================================="

          mkdir -p environments/Cluster02

          cp -R deploy/. environments/Cluster02/

###############################################################
# Cluster03
###############################################################

      - name: Deploy Cluster03

        if: ${{ inputs.deploy_cluster03 }}

        run: |

          echo "================================="
          echo "Deploying to Cluster03"
          echo "================================="

          mkdir -p environments/Cluster03

          cp -R deploy/. environments/Cluster03/

###############################################################
# Verify Deployment
###############################################################

      - name: Verify Deployment

        run: |

          echo "================================="
          echo "Deployment Verification"
          echo "================================="

          echo "RC"
          ls -R environments/RC || true

          echo ""

          echo "Cluster01"
          ls -R environments/Cluster01 || true

          echo ""

          echo "Cluster02"
          ls -R environments/Cluster02 || true

          echo ""

          echo "Cluster03"
          ls -R environments/Cluster03 || true

###############################################################
# Upload Deployment Package
###############################################################

      - name: Upload Deployment Result

        uses: actions/upload-artifact@v4

        with:
          name: DeploymentResult
          path: environments

###############################################################
# Release Summary
###############################################################

  release_summary:

    name: Release Summary

    needs:
      - download_artifact
      - deploy_production

    if: always()

    runs-on: ubuntu-latest

    steps:

      - name: Generate Release Summary

        run: |

          echo "==============================================="
          echo "        ADMIN API RELEASE SUMMARY"
          echo "==============================================="

          echo ""
          echo "Repository"
          echo "${{ github.repository }}"

          echo ""

          echo "Branch"
          echo "${{ github.ref_name }}"

          echo ""

          echo "Workflow"
          echo "${{ github.workflow }}"

          echo ""

          echo "Run Number"
          echo "${{ github.run_number }}"

          echo ""

          echo "Run ID"
          echo "${{ github.run_id }}"

          echo ""

          echo "Triggered By"
          echo "${{ github.actor }}"

          echo ""

          echo "Artifact ID"
          echo "${{ inputs.artifact_id }}"

          echo ""

          echo "Deployment Targets"

          if [ "${{ inputs.deploy_rc }}" = "true" ]; then
            echo "✔ RC"
          fi

          if [ "${{ inputs.deploy_cluster01 }}" = "true" ]; then
            echo "✔ Cluster01"
          fi

          if [ "${{ inputs.deploy_cluster02 }}" = "true" ]; then
            echo "✔ Cluster02"
          fi

          if [ "${{ inputs.deploy_cluster03 }}" = "true" ]; then
            echo "✔ Cluster03"
          fi

          echo ""
          echo "==============================================="
          echo "Release Completed Successfully"
          echo "==============================================="

###############################################################
# Create Release Report
###############################################################

      - name: Create Release Report

        run: |

          cat <<EOF > ReleaseReport.txt

          ===============================================

          ADMIN API RELEASE REPORT

          ===============================================

          Repository : ${{ github.repository }}

          Branch     : ${{ github.ref_name }}

          Workflow   : ${{ github.workflow }}

          Run Number : ${{ github.run_number }}

          Run ID     : ${{ github.run_id }}

          Triggered By : ${{ github.actor }}

          Artifact ID  : ${{ inputs.artifact_id }}

          RC          : ${{ inputs.deploy_rc }}

          Cluster01   : ${{ inputs.deploy_cluster01 }}

          Cluster02   : ${{ inputs.deploy_cluster02 }}

          Cluster03   : ${{ inputs.deploy_cluster03 }}

          ===============================================

          STATUS : SUCCESS

          ===============================================

          EOF

      - name: Upload Release Report

        uses: actions/upload-artifact@v4

        with:
          name: ReleaseReport
          path: ReleaseReport.txt
