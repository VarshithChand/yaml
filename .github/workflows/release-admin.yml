name: Release Admin API

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  read_config:
    name: Read Patch Configuration
    runs-on: ubuntu-latest

    outputs:
      sprint: ${{ steps.config.outputs.sprint }}
      patch: ${{ steps.config.outputs.patch }}

    steps:
      - uses: actions/checkout@v4

      - id: config
        shell: bash
        run: |
          echo "sprint=$(grep '^SPRINT=' config/patch.config | cut -d '=' -f2)" >> $GITHUB_OUTPUT
          echo "patch=$(grep '^PATCH=' config/patch.config | cut -d '=' -f2)" >> $GITHUB_OUTPUT

  deploy_rc:
    name: Deploy to RC
    needs: read_config
    runs-on: ubuntu-latest

    environment:
      name: RC

    steps:

      - uses: actions/checkout@v4

      - name: Copy Latest Artifact
        shell: bash
        run: |
          mkdir -p deploy
          LATEST=$(ls -t artifacts/AdminAPI/New/*.zip | head -1)
          cp "$LATEST" deploy/

      - name: Show Artifact
        run: ls -R deploy

      - name: Create RC Folder
        run: mkdir -p environments/RC

      - name: Deploy RC
        run: cp -R deploy/. environments/RC/

  deploy_cluster01:
    name: Deploy Cluster01
    needs:
      - read_config
      - deploy_rc

    runs-on: ubuntu-latest

    environment:
      name: Cluster01

    steps:

      - uses: actions/checkout@v4

      - name: Copy Latest Artifact
        shell: bash
        run: |
          mkdir -p deploy
          LATEST=$(ls -t artifacts/AdminAPI/New/*.zip | head -1)
          cp "$LATEST" deploy/

      - run: mkdir -p environments/Cluster01

      - run: cp -R deploy/. environments/Cluster01/

  deploy_cluster02:
    name: Deploy Cluster02
    needs:
      - read_config
      - deploy_cluster01

    runs-on: ubuntu-latest

    environment:
      name: Cluster02

    steps:

      - uses: actions/checkout@v4

      - name: Copy Latest Artifact
        shell: bash
        run: |
          mkdir -p deploy
          LATEST=$(ls -t artifacts/AdminAPI/New/*.zip | head -1)
          cp "$LATEST" deploy/

      - run: mkdir -p environments/Cluster02

      - run: cp -R deploy/. environments/Cluster02/

  deploy_cluster03:
    name: Deploy Cluster03
    needs:
      - read_config
      - deploy_cluster02

    runs-on: ubuntu-latest

    environment:
      name: Cluster03

    steps:

      - uses: actions/checkout@v4

      - name: Copy Latest Artifact
        shell: bash
        run: |
          mkdir -p deploy
          LATEST=$(ls -t artifacts/AdminAPI/New/*.zip | head -1)
          cp "$LATEST" deploy/

      - run: mkdir -p environments/Cluster03

      - run: cp -R deploy/. environments/Cluster03/
