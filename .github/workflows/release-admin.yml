name: Release Admin API

on:
  workflow_dispatch:

jobs:

  read_config:
    name: Read Patch Configuration
    runs-on: ubuntu-latest

    outputs:
      sprint: ${{ steps.config.outputs.sprint }}
      patch: ${{ steps.config.outputs.patch }}

    steps:
      - uses: actions/checkout@v4

      - id: config
        shell: bash
        run: |
          echo "sprint=$(grep SPRINT config/patch.config | cut -d '=' -f2)" >> $GITHUB_OUTPUT
          echo "patch=$(grep PATCH config/patch.config | cut -d '=' -f2)" >> $GITHUB_OUTPUT

  deploy_rc:
    name: Deploy to RC
    needs: read_config
    runs-on: ubuntu-latest

    environment:
      name: RC

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: Admin_Sprint${{ needs.read_config.outputs.sprint }}_Patch${{ needs.read_config.outputs.patch }}
          path: deploy

      - name: Show Artifact
        run: ls -R deploy

      - name: Create RC Folder
        run: mkdir -p environments/RC

      - name: Deploy RC
        run: cp -R deploy/. environments/RC/

  deploy_cluster01:
    name: Deploy Cluster01
    needs: deploy_rc
    runs-on: ubuntu-latest

    environment:
      name: Cluster01

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: Admin_Sprint${{ needs.read_config.outputs.sprint }}_Patch${{ needs.read_config.outputs.patch }}
          path: deploy

      - run: mkdir -p environments/Cluster01

      - run: cp -R deploy/. environments/Cluster01/

  deploy_cluster02:
    name: Deploy Cluster02
    needs: deploy_cluster01
    runs-on: ubuntu-latest

    environment:
      name: Cluster02

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: Admin_Sprint${{ needs.read_config.outputs.sprint }}_Patch${{ needs.read_config.outputs.patch }}
          path: deploy

      - run: mkdir -p environments/Cluster02

      - run: cp -R deploy/. environments/Cluster02/

  deploy_cluster03:
    name: Deploy Cluster03
    needs: deploy_cluster02
    runs-on: ubuntu-latest

    environment:
      name: Cluster03

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: Admin_Sprint${{ needs.read_config.outputs.sprint }}_Patch${{ needs.read_config.outputs.patch }}
          path: deploy

      - run: mkdir -p environments/Cluster03

      - run: cp -R deploy/. environments/Cluster03/
